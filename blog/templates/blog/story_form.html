{% extends 'blog/base.html' %}
{% block content %}
<div class="container mt-5" style="max-width:500px;">
    <div class="bg-white rounded-3 shadow-sm p-4">
        <h4 class="fw-bold mb-4">Create Story</h4>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Story Image</label>
                {{ form.image }}
            </div>
            {% if form.errors %}
                <div class="alert alert-danger">Please upload a valid image.</div>
            {% endif %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Share Story</button>
                <a href="{% url 'home' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
