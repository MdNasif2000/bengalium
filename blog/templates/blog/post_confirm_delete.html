{% extends 'blog/base.html' %}
{% block content %}
<div class="container mt-5" style="max-width:500px;">
    <div class="bg-white rounded-3 shadow-sm p-4 text-center">
        <i class="fa fa-trash fa-3x text-danger mb-3"></i>
        <h4 class="fw-bold">Delete Post</h4>
        <p class="text-muted">Are you sure you want to delete "<strong>{{ post.title }}</strong>"? This cannot be undone.</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-3">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
