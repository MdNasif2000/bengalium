{% extends 'blog/base.html' %}
{% block content %}
<div class="container mt-5" style="max-width:650px;">
    <div class="bg-white rounded-3 shadow-sm p-4">
        <h4 class="fw-bold mb-4">{{ action }} Post</h4>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Title</label>
                {{ form.title }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Content</label>
                {{ form.content }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Cover Image (optional)</label>
                {{ form.image }}
            </div>
            {% if form.errors %}
                <div class="alert alert-danger">
                    {% for field in form %}{% for error in field.errors %}<p class="mb-0">{{ error }}</p>{% endfor %}{% endfor %}
                </div>
            {% endif %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">{{ action }} Post</button>
                <a href="{% url 'home' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
