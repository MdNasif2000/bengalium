{% extends 'blog/base.html' %}
{% block content %}
<div class="container mt-5" style="max-width:800px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">My Posts</h4>
        <a href="{% url 'post_create' %}" class="btn btn-primary btn-sm"><i class="fa fa-plus me-1"></i>New Post</a>
    </div>

    {% for post in posts %}
    <div class="bg-white rounded-3 shadow-sm p-4 mb-3 d-flex justify-content-between align-items-start">
        <div>
            <a href="{% url 'post_detail' post.pk %}" class="fw-semibold text-decoration-none text-dark">{{ post.title }}</a>
            <div class="text-muted mt-1" style="font-size:0.82rem;">
                {{ post.created_at|date:"d M Y" }} &nbsp;·&nbsp;
                <i class="fa fa-eye"></i> {{ post.views }} &nbsp;·&nbsp;
                <i class="fa fa-heart"></i> {{ post.total_likes }}
            </div>
        </div>
        <div class="d-flex gap-2">
            <a href="{% url 'post_edit' post.pk %}" class="btn btn-outline-primary btn-sm">Edit</a>
            <a href="{% url 'post_delete' post.pk %}" class="btn btn-outline-danger btn-sm">Delete</a>
        </div>
    </div>
    {% empty %}
        <div class="text-center text-muted py-5">You haven't written any posts yet.</div>
    {% endfor %}
</div>
{% endblock %}
