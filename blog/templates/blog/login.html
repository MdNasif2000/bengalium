{% extends 'blog/base.html' %}
{% block content %}
<div class="container mt-5" style="max-width:440px;">
    <div class="bg-white rounded-3 shadow-sm p-4">
        <h4 class="fw-bold mb-1 text-center">Welcome Back</h4>
        <p class="text-muted text-center mb-4">Log in to Bengalium</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Username </label>
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            {% if form.errors %}
                <div class="alert alert-danger">Invalid username or password.</div>
            {% endif %}
            <button type="submit" class="btn btn-primary w-100 mt-2">Log In</button>
        </form>
        <p class="text-center mt-3 text-muted">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
    </div>
</div>
{% endblock %}
